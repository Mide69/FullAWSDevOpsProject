# Helm values for aws-load-balancer-controller (chart: eks/aws-load-balancer-controller)
# Install: helm install aws-load-balancer-controller eks/aws-load-balancer-controller \
#            -n kube-system -f k8s/platform/lbc-values.yaml
clusterName: dev-govplatform
region: eu-west-2
# vpcId MUST be passed explicitly — auto-discovery via EC2 IMDS fails because
# EKS pods can't reach instance metadata (hop-limit restriction). Pass it at
# install time from Terraform output:
#   helm install ... --set vpcId=$(terraform -chdir=... output -raw vpc_id)

serviceAccount:
  create: true
  name: aws-load-balancer-controller
  annotations:
    # Binds this ServiceAccount to the IRSA role created in Terraform.
    # This annotation is the other half of the IRSA handshake.
    eks.amazonaws.com/role-arn: arn:aws:iam::445358171352:role/dev-aws-lbc-role
