apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: user-service
  annotations:
    # The LB Controller reads these annotations to build the ALB.
    alb.ingress.kubernetes.io/scheme: internet-facing      # public ALB
    alb.ingress.kubernetes.io/target-type: ip              # route straight to pod IPs
    alb.ingress.kubernetes.io/healthcheck-path: /health    # ALB health check
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 80
