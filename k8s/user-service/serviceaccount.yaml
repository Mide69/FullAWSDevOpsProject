apiVersion: v1
kind: ServiceAccount
metadata:
  name: user-service
  annotations:
    # The IRSA handshake (Kubernetes half): bind this ServiceAccount to the IAM
    # role created in Terraform. Role NAME is stable across rebuilds, so this
    # annotation never needs editing.
    eks.amazonaws.com/role-arn: arn:aws:iam::445358171352:role/dev-user-service
